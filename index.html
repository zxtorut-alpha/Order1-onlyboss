<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Nonly | Secure Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-red: #ff1e27;
            --bg-deep: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --brd: rgba(255, 255, 255, 0.1);
            --ios-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg-deep); color: var(--text-main);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(255, 30, 39, 0.15) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; min-height: 100dvh; 
            overflow-y: auto; /* KEYBOARD FIX: Allow scrolling if needed */
        }

        /* --- Full Screen Container --- */
        .fullscreen-wrapper {
            width: 100%; flex: 1; /* Pushes footer down naturally */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; z-index: 10;
            
            opacity: 0; transform: scale(0.95) translateY(30px);
            animation: splashIn 0.8s var(--ios-spring) forwards;
        }
        @keyframes splashIn { to { opacity: 1; transform: scale(1) translateY(0); } }

        /* --- Bigger Logo --- */
        .logo-box {
            width: 90px; height: 90px; border-radius: 22px; overflow: hidden;
            border: 2px solid var(--primary-red); margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 30, 39, 0.4);
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;}
        .brand-title span { color: var(--primary-red); }
        
        .subtitle { 
            color: var(--text-muted); font-size: 0.95rem; margin-bottom: 50px; 
            line-height: 1.6; text-align: center; max-width: 350px; 
        }

        /* --- Input Area --- */
        .input-container { width: 100%; max-width: 350px; position: relative; margin-bottom: 25px; }
        .input-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        
        .access-input {
            width: 100%; background: rgba(20, 20, 20, 0.8); border: 2px solid #222;
            padding: 20px 20px 20px 55px; border-radius: 18px;
            color: #fff; font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
            transition: 0.3s; letter-spacing: 2px; backdrop-filter: blur(10px);
        }
        .access-input:focus { border-color: var(--primary-red); background: #0a0a0a; box-shadow: 0 0 20px rgba(255, 30, 39, 0.2); }
        .access-input::placeholder { text-transform: none; letter-spacing: normal; font-weight: 600; color: #444; }

        /* --- Action Button --- */
        .btn-enter {
            width: 100%; max-width: 350px; background: var(--primary-red); color: #fff;
            border: none; padding: 20px; border-radius: 18px;
            font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.1rem; text-transform: uppercase;
            cursor: pointer; transition: 0.2s var(--ios-spring); letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(255, 30, 39, 0.4);
        }
        .btn-enter:active { transform: scale(0.96); filter: brightness(0.8); }
        
        .loading-spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 30px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; display: none; z-index: 2000; text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

        /* KEYBOARD FIX: Footer setup */
        .footer-branding { 
            position: relative; padding-bottom: 25px; 
            font-size: 0.75rem; color: #444; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 2px; text-align: center; width: 100%;
        }

        /* KEYBOARD FIX: Hide footer when keyboard is open (screen height is small) */
        @media (max-height: 600px) {
            .footer-branding { display: none; }
            .fullscreen-wrapper { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div id="toast">Error Message</div>

    <div class="fullscreen-wrapper">
        <div class="logo-box">
            <img src="logo.jpg" alt="1N">
        </div>
        <h1 class="brand-title">1Nonly<span>.Access</span></h1>
        <p class="subtitle">Enter your secure verification code to unlock the Pro Cloud Database.</p>

        <div class="input-container">
            <i class="fa-solid fa-lock"></i>
            <input type="text" id="accessCode" class="access-input" placeholder="ACCESS CODE" autocomplete="off">
        </div>

        <button class="btn-enter" id="loginBtn">
            <span id="btnText">Verify & Unlock</span>
            <div class="loading-spinner" id="spinner"></div>
        </button>
    </div>

    <div class="footer-branding">ZxTORUT MASTER &copy; 2026</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUyUhse0_qoIW9vn0HNClUW92PNmCpjoc",
            authDomain: "nonly-cb160.firebaseapp.com",
            projectId: "nonly-cb160",
            storageBucket: "nonly-cb160.firebasestorage.app",
            messagingSenderId: "49260369408",
            appId: "1:49260369408:web:8546954b43d72dcf742ae5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if (sessionStorage.getItem("1nonly_auth") === "true") {
            window.location.href = "home.html"; 
        }

        const loginBtn = document.getElementById('loginBtn');
        const accessInput = document.getElementById('accessCode');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        loginBtn.addEventListener('click', async () => {
            const code = accessInput.value.trim().toUpperCase(); 
            
            accessInput.blur(); 

            if (!code) { showToast("ENTER AN ACCESS CODE!"); return; }

            btnText.style.display = "none";
            spinner.style.display = "block";
            loginBtn.style.pointerEvents = "none";

            try {
                const docRef = doc(db, "settings", "access");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const realCode = docSnap.data().code.toUpperCase();
                    
                    if (code === realCode) {
                        showToast("ACCESS GRANTED");
                        sessionStorage.setItem("1nonly_auth", "true"); 
                        
                        setTimeout(() => {
                            window.location.href = "home.html"; 
                        }, 1000);
                    } else {
                        showToast("INVALID ACCESS CODE");
                        resetBtn();
                    }
                } else {
                    showToast("Code system not configured!");
                    resetBtn();
                }
            } catch (error) {
                console.error("Firebase Error: ", error);
                showToast("NETWORK ERROR!");
                resetBtn();
            }
        });

        accessInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loginBtn.click();
            }
        });

        function resetBtn() {
            btnText.style.display = "block";
            spinner.style.display = "none";
            loginBtn.style.pointerEvents = "auto";
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
